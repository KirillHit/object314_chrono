name: Lint

on:
  push:
    paths:
      - "src/**"
      - ".github/workflows/lint.yml"
      - ".clang-format"
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/lint.yml"
      - ".clang-format"

jobs:
  lint-clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: clang-format check
        run: |
          git ls-files -z -- 'src/*.c' 'src/*.cc' 'src/*.cpp' 'src/*.cxx' 'src/*.h' 'src/*.hh' 'src/*.hpp' 'src/*.hxx' |
            xargs -0 -r uvx --from clang-format==20.1.8 clang-format --dry-run -Werror